@(viewModel: femr.ui.models.medical.EditViewModelGet, assets: AssetsFinder)

<link rel="stylesheet" href="@assets.path("css/medical/newVitals.css")" xmlns="http://www.w3.org/1999/xhtml">
<script type="text/javascript" src="@assets.path("js/medical/newVitals.js")"></script>
<script type="text/javascript" src="@assets.path("js/shared/vitalClientValidation.js")"></script>

<div id="vitalContainer" class="femr-vitals-dialog">

    <div id="left" class="femr-vitals-column">
        <div class="vitalWrap">
            <label>BP</label>
            <br/>
            <input type="number" class="fInput femr-input" id="newSystolic" placeholder="systolic"/>
            <input type="number" class="fInput femr-input" id="newDiastolic" placeholder="diastolic"/>
        </div>
        <div class="vitalWrap">
            <label>HR</label>
            <br/>
            <input type="number" class="fInput femr-input" id="newHeartRate" placeholder="bpm"/>
        </div>
        <div class="vitalWrap">
            <label>T</label>
            <br/>
            @if(viewModel.getSettings.isMetric) { <!---  Alaa Serhan -->
                <input type="number" class="fInput femr-input" id="newTemperature" placeholder="C"/>
            } else {
                <input type="number" class="fInput femr-input" id="newTemperature" placeholder="F"/>
            }
        </div>
        <div class="vitalWrap">
            <label>RR</label>
            <br/>
            <input type="number" class="fInput femr-input" id="newRespiratoryRate" placeholder="bpm"/>
        </div>
        <label class="btn btn-default femr-btn femr-btn--ghost" for="newSmoker" id="medical_new_vitals_Smoking">Smoking
        <input type="checkbox" class="fButton" id="newSmoker" name="smoker" value="1" />
        </label>

        <br/>
        <label class="btn btn-default femr-btn femr-btn--ghost" for="newDiabetic" id="medical_new_vitals_Diabetes">Diabetes
        <input type="checkbox" class="fButton" id="newDiabetic" name="diabetic" value="1" />
        </label>
        <br>
        <label class="btn btn-default femr-btn femr-btn--ghost" for="newAlcohol" id="medical_new_vitals_Alcohol">Alcohol
        <input type="checkbox" class="fButton" id="newAlcohol" name="alcohol" value="1" />
        </label>
        <br>
        <label class="btn btn-default femr-btn femr-btn--ghost" for="newCholesterol" id="medical_new_vitals_Cholesterol">Cholesterol
            <input type="checkbox" class="fButton" id="newCholesterol" name="cholesterol" value="1" />
        </label>
        <br>
        <label class="btn btn-default femr-btn femr-btn--ghost" for="newHypertension" id="medical_new_vitals_Hypertension">Hypertension
            <input type="checkbox" class="fButton" id="newHypertension" name="hypertension" value="1" />
        </label>
        <br/>

    </div>
    <div id="right" class="femr-vitals-column">
        <div class="vitalWrap">
            <label>Gluc</label>
            <br/>
            <input type="number" class="fInput femr-input" id="newGlucose" placeholder="mg/dl"/>
        </div>
        <div class="vitalWrap">
            <label>SpO2</label>
            <br/>
            <input type="number" class="fInput femr-input" id="newOxygen" placeholder="%"/>
        </div>
        <div class="vitalWrap">
            <label>Ht</label>
            <br/>
            @if(viewModel.getSettings.isMetric) { <!---  Alaa Serhan -->
                <input type="number" class="fInput femr-input" id="newHeightFeet" placeholder="m"/>
                <input type="number" class="fInput femr-input" id="newHeightInches" placeholder="cm"/>
            } else {
                <input type="number" class="fInput femr-input" id="newHeightFeet" placeholder="ft"/>
                <input type="number" class="fInput femr-input" id="newHeightInches" placeholder="in"/>
            }
        </div>
        <div class="vitalWrap">
            <label>Wt</label>
            <br/>
            @if(viewModel.getSettings.isMetric) { <!---  Alaa Serhan -->
                <input type="number" class="fInput femr-input" id="newWeight" placeholder="kgs"/>
            } else {
                <input type="number" class="fInput femr-input" id="newWeight" placeholder="lbs"/>
            }
        </div>
        <div class="vitalWrap">
            <label>WP</label> <!--- Sam Zanni -->
            <br/>
            <input type="number" class="fInput femr-input" id="weeksPreg" placeholder="weeks"/>
        </div>
    </div>
    <div id="theButtons">
        <button type="button" id="saveVitalsBtn" class="fButton femr-btn femr-btn--primary">Save</button>
        <button type="button" id="cancelVitalsBtn" class="fButton femr-btn femr-btn--ghost">Cancel</button>
    </div>

</div>
