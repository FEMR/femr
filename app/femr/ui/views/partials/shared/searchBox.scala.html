@(page: java.lang.String,
        currentUser: femr.common.dtos.CurrentUser,
        patientId: java.lang.Integer,
        message: java.lang.String)

<script>
        document.addEventListener('DOMContentLoaded', function(event) {
            let languageData;
            fetch('@routes.Assets.versioned("json/languages.json")')
                    .then(response => response.json())
                    .then(data => {
                        languageData = data;
                        updateLanguage("@{currentUser.getLanguageCode()}");

                    });

            function updateTextContent(elementId, value) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = value;
                }
            }

            function updateLanguage(languageCode = "en") {
                localStorage.setItem('languageCode', languageCode);
                updateTextContent("search_btn", languageData[languageCode].search_btn);
                const searchBtnElement = document.getElementsByClassName("idSearch")
                if (searchBtnElement) {
                    searchBtnElement[0].textContent = languageData[languageCode].search_btn
                }
                const patientIDSearch = document.getElementById("id");
                if (patientIDSearch) {
                    patientIDSearch.placeholder = languageData[languageCode].patient_id;
                }
            }
        });
</script>

<div class="searchWrap femr-search">
    <div class="femr-search__header">
        <h2 class="femr-search__title" id="search_box_title">@page Search</h2>
    </div>
    <div class="femr-search__body">
    @if(patientId > 0) {

        <label for="id" class="hidden">Patient ID</label>
        <input type="number" class="fButtonSearch femr-input femr-search__input" id="id" name="id" value="@patientId" readonly/>


        <p class="femr-search__message">@message</p>

            <div class="femr-search__actions">
                <a href="/medical/edit/@patientId" class="fButton fOtherButton fYesButton femr-btn femr-btn--primary">Yes</a>
                <a href="/medical" class="fButton fOtherButton fNoButton femr-btn femr-btn--ghost">No</a>
            </div>


    } else {

        <label for="id" class="hidden">Patient ID</label>
        <input type="number" class="fButtonSearch femr-input femr-search__input" id="id" name="id" placeholder="Patient ID">

        <p class="femr-search__message">@message</p>
        @*idSearch used to validate id via client*@
    <button type="submit" class="idSearch fLandingSearchButton femr-btn femr-btn--primary femr-search__submit">Search</button>
    }
    </div>
</div>
