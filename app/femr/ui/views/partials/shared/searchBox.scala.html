@(page: java.lang.String,
        currentUser: femr.common.dtos.CurrentUser,
        patientId: java.lang.Integer,
        message: java.lang.String)

<script>
        document.addEventListener('DOMContentLoaded', function(event) {
            let languageData;
            const searchMessageKeys = {
                "No prescriptions found for that patient": "pharmacy_search_no_prescriptions",
                "That patient's encounter has been closed.": "search_error_encounter_closed",
                "That patient has already been seen today. Would you like to edit their encounter?": "search_error_patient_seen_today",
                "No record found for that patient": "search_error_no_record_found"
            };
            const patientSavedPattern = /^Patient information for (.+) \(id: ([^)]+)\) was saved successfully\.$/;

            fetch('@routes.Assets.versioned("json/languages.json")')
                    .then(response => response.json())
                    .then(data => {
                        languageData = data;
                        updateLanguage("@{currentUser.getLanguageCode()}");

                    });

            function updateTextContent(elementId, value) {
                const element = document.getElementById(elementId);
                if (element && value) {
                    element.textContent = value;
                }
            }

            function updateLanguage(languageCode = "en") {
                const language = languageData[languageCode] ? languageCode : "en";
                const strings = Object.assign({}, languageData.en || {}, languageData[language] || {});
                const pageKey = "@page".toLowerCase();

                localStorage.setItem('languageCode', language);
                updateTextContent("search_box_title", strings["title_" + pageKey + "_search"]);
                updateTextContent("search_btn", strings.search_btn);
                updateTextContent("search_yes", strings.search_yes);
                updateTextContent("search_no", strings.search_no);

                const searchBtnElement = document.getElementsByClassName("idSearch")
                if (searchBtnElement.length) {
                    searchBtnElement[0].textContent = strings.search_btn
                }
                const patientIDSearch = document.getElementById("id");
                if (patientIDSearch) {
                    patientIDSearch.placeholder = strings.patient_id;
                }

                document.querySelectorAll("[data-search-message]").forEach(function(messageElement) {
                    const message = messageElement.getAttribute("data-search-message");
                    const savedPatientMatch = patientSavedPattern.exec(message);
                    if (savedPatientMatch && strings.search_success_patient_saved) {
                        messageElement.textContent = strings.search_success_patient_saved
                            .replace("{name}", savedPatientMatch[1])
                            .replace("{id}", savedPatientMatch[2]);
                        return;
                    }

                    const messageKey = searchMessageKeys[message];
                    if (messageKey && strings[messageKey]) {
                        messageElement.textContent = strings[messageKey];
                    }
                });
            }
        });
</script>

<div class="searchWrap femr-search">
    <div class="femr-search__header">
        <h2 class="femr-search__title" id="search_box_title">@page Search</h2>
    </div>
    <div class="femr-search__body">
    @if(patientId > 0) {

        <label for="id" class="hidden">Patient ID</label>
        <input type="number" class="fButtonSearch femr-input femr-search__input" id="id" name="id" value="@patientId" readonly/>


        <p class="femr-search__message" id="search_box_message" data-search-message="@message">@message</p>

            <div class="femr-search__actions">
                <a href="/medical/edit/@patientId" class="fButton fOtherButton fYesButton femr-btn femr-btn--primary" id="search_yes">Yes</a>
                <a href="/medical" class="fButton fOtherButton fNoButton femr-btn femr-btn--ghost" id="search_no">No</a>
            </div>


    } else {

        <label for="id" class="hidden">Patient ID</label>
        <input type="number" class="fButtonSearch femr-input femr-search__input" id="id" name="id" placeholder="Patient ID">

        <p class="femr-search__message" id="search_box_message" data-search-message="@message">@message</p>
        @*idSearch used to validate id via client*@
    <button type="submit" class="idSearch fLandingSearchButton femr-btn femr-btn--primary femr-search__submit">Search</button>
    }
    </div>
</div>
